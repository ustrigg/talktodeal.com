<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Media Agent | TalkToDeal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-hover: #f0f0f2;
      --text: #111111;
      --text-soft: rgba(17,17,17,0.6);
      --accent: #0071e3;
      --accent-soft: rgba(0,113,227,0.10);
      --green: #30d158;
      --orange: #ff9f0a;
      --line: rgba(17,17,17,0.08);
      --radius: 20px;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", sans-serif;
      background: #f5f5f7;
      color: var(--text);
    }

    /* ─── Header ─── */
    .header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .header a { color: var(--text-soft); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.15s; }
    .header a:hover { color: var(--text); }
    .header .brand { font-size: 1rem; font-weight: 700; color: var(--text); margin-right: auto; }
    .header .page-title {
      font-size: 0.85rem; font-weight: 600; color: var(--accent);
      display: flex; align-items: center; gap: 6px;
    }
    .header .page-title::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    }

    /* ─── Main Layout — full page, no separate scroll container ─── */
    .main {
      max-width: 720px; width: 100%; margin: 0 auto; padding: 0 16px 120px;
    }

    /* ─── Chat Area — just a flex column, page itself scrolls ─── */
    .chat {
      display: flex; flex-direction: column; gap: 16px;
      padding: 24px 0;
    }

    .msg {
      max-width: 85%; padding: 14px 18px; border-radius: var(--radius);
      font-size: 0.95rem; line-height: 1.55; word-wrap: break-word;
    }
    .msg.bot {
      align-self: flex-start; background: #ffffff;
      border: 1px solid var(--line); border-bottom-left-radius: 6px;
    }
    .msg.user {
      align-self: flex-end; background: var(--accent-soft);
      border: 1px solid rgba(0,113,227,0.15); border-bottom-right-radius: 6px;
    }
    .msg.system {
      align-self: center; text-align: center; font-size: 0.82rem;
      color: var(--text-soft); background: none; padding: 8px;
    }

    /* ─── Media Results (no bubble, inline in chat) ─── */
    .media-block {
      width: 100%; max-width: 480px; align-self: flex-start;
    }
    .media-block img, .media-block video {
      width: 100%; display: block; border-radius: 12px;
      border: 1px solid var(--line); box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .media-block .media-actions {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; font-size: 0.8rem;
    }
    .media-block .media-actions .media-tag {
      color: var(--text-soft); margin-right: auto;
    }
    .media-block .media-actions a {
      color: var(--accent); font-weight: 500; text-decoration: none;
      display: flex; align-items: center; gap: 4px; transition: opacity 0.15s;
    }
    .media-block .media-actions a:hover { opacity: 0.7; }

    /* ─── Typing Indicator ─── */
    .typing {
      align-self: flex-start; display: flex; gap: 4px; padding: 14px 18px;
      background: #ffffff; border: 1px solid var(--line);
      border-radius: var(--radius); border-bottom-left-radius: 6px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(0,0,0,0.25); animation: typingDot 1.4s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ─── Status Indicator (inline in chat flow) ─── */
    .status-inline {
      display: none; align-items: center; gap: 8px; align-self: flex-start;
      padding: 10px 16px; font-size: 0.85rem; color: var(--text-soft);
    }
    .status-inline.active { display: flex; }
    .status-spinner {
      width: 14px; height: 14px; border: 2px solid var(--line);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Input Area (sticky at bottom) ─── */
    .input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px 24px;
      background: linear-gradient(transparent, #f5f5f7 20%);
    }
    .input-area .input-row {
      max-width: 720px; margin: 0 auto;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-row textarea {
      flex: 1; padding: 14px 18px; border-radius: var(--radius);
      border: 1px solid var(--line); background: var(--surface); color: var(--text);
      font-family: inherit; font-size: 0.95rem; line-height: 1.5;
      resize: none; outline: none; min-height: 48px; max-height: 120px;
      transition: border-color 0.15s;
    }
    .input-row textarea:focus { border-color: var(--accent); }
    .input-row textarea::placeholder { color: var(--text-soft); }
    .send-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: grid; place-items: center; flex-shrink: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { transform: scale(1.05); }

    /* ─── Limit Notice ─── */
    .limit-notice {
      display: none; text-align: center; padding: 24px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius); margin-top: 12px;
    }
    .limit-notice.active { display: block; }
    .limit-notice h3 { font-size: 1.1rem; margin: 0 0 8px; color: var(--orange); }
    .limit-notice p { margin: 0; font-size: 0.9rem; color: var(--text-soft); }
    .limit-notice a { color: var(--accent); }

    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .main { padding: 0 12px 120px; }
      .msg { max-width: 92%; font-size: 0.9rem; }
      .media-block { max-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a class="brand" href="/">TalkToDeal</a>
    <span class="page-title">AI Media Agent</span>
    <a href="/">Back to Home</a>
  </header>

  <div class="main">
    <div class="chat" id="chat">
      <!-- Bot sends the first message on load -->
    </div>

    <div class="status-inline" id="statusBar">
      <div class="status-spinner"></div>
      <span id="statusText">Generating your content...</span>
    </div>

    <div class="limit-notice" id="limitNotice">
      <h3>Trial limit reached</h3>
      <p>You've used your free trial for today. <a href="https://calendar.app.google/aU3fdfyDQUxhAjFu5" target="_blank">Book a demo</a> to learn more about our full AI content suite.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Type your message..." autofocus></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════════════════
    // API 地址：本地开发时连 localhost:5090，线上走相对路径
    // ════════════════════════════════════════════════════════════
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5090'
      : '/agents/media/api';

    // ════════════════════════════════════════════════════════════
    // 常量配置
    // ════════════════════════════════════════════════════════════
    const RATE_LIMIT_KEY = 'ttd_media_sessions';  // localStorage 里的 key 名，用来记录某个浏览器今天开了几个 session，ttd_media_sessions: {date, count}
    const MAX_SESSIONS_PER_DAY = 50;              // 前端限制：某个浏览器每天最多开 50 个对话（测试阶段放宽）
    const MAX_GENERATES_PER_SESSION = 10;          // 前端限制：每个对话里最多触发 10 次生成（测试阶段放宽）

    // ════════════════════════════════════════════════════════════
    // 状态变量
    // ════════════════════════════════════════════════════════════
    // ttd_media_session是某个浏览器当前对话session的id
    // sessionId 存在 sessionStorage 里：刷新页面还在，关标签页就清除
    // 这样用户刷新后能恢复对话，关了标签页就是全新开始
    let sessionId = sessionStorage.getItem('ttd_media_session') || null;
    let generating = false;  // 是否正在生成中（防止用户重复发消息）
    // 当前这个浏览器的session是第几次对话
    // generateCount 也存在 sessionStorage，刷新后记住这个 session 已经生成了几次
    let generateCount = parseInt(sessionStorage.getItem('ttd_media_gencount') || '0');

    // ════════════════════════════════════════════════════════════
    // 获取页面上的 HTML 元素引用（用来操作界面）
    // ════════════════════════════════════════════════════════════
    const chatEl = document.getElementById('chat');           // 聊天消息容器（所有消息气泡都 append 到这里）
    const inputEl = document.getElementById('input');         // 用户输入框 <textarea>
    const sendBtn = document.getElementById('sendBtn');       // 发送按钮（紫色圆形）
    const statusBar = document.getElementById('statusBar');   // 生成中的状态提示条（"Generating..."）
    const statusText = document.getElementById('statusText'); // 状态条里的文字（可动态更新进度）
    const limitNotice = document.getElementById('limitNotice'); // 超限提示卡片（"Trial limit reached"）

    // ════════════════════════════════════════════════════════════
    // Bot 欢迎消息（页面加载时显示，告诉用户需要提供什么信息）
    // ════════════════════════════════════════════════════════════
    const WELCOME_MSG = `Hi! I'm an AI Media Agent. I can generate custom ad images and videos for your business.

To get started, tell me:
1. What's the content for? (e.g. a product launch, seasonal promotion, social media post)
2. What visual style do you prefer? (e.g. modern, warm, playful, professional)

You can also mention your company name, industry, color preferences, or any specific ideas. For example:

"I need a professional ad image for my plumbing company's spring discount — clean modern style with blue tones."

Just describe what you need and I'll ask follow-up questions if needed!`;

    // ════════════════════════════════════════════════════════════
    // 前端限流（localStorage）
    // 用 localStorage 是因为它跨标签页、关浏览器都不丢，适合做"每天 N 次"的计数
    // 存储格式：{"date": "2026-04-02", "count": 2}
    // 每天自动重置（通过比较 date 字段）
    // ════════════════════════════════════════════════════════════

    // 读取这个浏览器今天的 session 使用计数，如果日期变了就自动归零
    // 输入：无
    // 输出：{ date: "2026-04-02", count: 2 }
    // 例子：
    //   第一次访问 → { date: "2026-04-02", count: 0 }  （localStorage 里没数据或者新的一天开始，返回今天的日期和count=0）
    //   开了2个session后 → { date: "2026-04-02", count: 2 }
    //   第二天访问 → { date: "2026-04-03", count: 0 }  （日期变了，自动重置）
    function getRateLimitData() {
      try {
        const data = JSON.parse(localStorage.getItem(RATE_LIMIT_KEY) || '{}');
        const today = new Date().toISOString().slice(0, 10); // "2026-04-02"
        if (data.date !== today) return { date: today, count: 0 }; // 新的一天，重置
        return data;
      } catch { return { date: new Date().toISOString().slice(0, 10), count: 0 }; }
    }

    // 开新 session 时调用，把这个浏览器今天的 session 计数 +1
    // 输入：无
    // 输出：无（副作用：localStorage 里的 count 加 1）
    // 例子：
    //   调用前 localStorage: {"date":"2026-04-02","count":1}
    //   调用后 localStorage: {"date":"2026-04-02","count":2}
    function incrementRateLimit() {
      const data = getRateLimitData();
      data.count++;
      localStorage.setItem(RATE_LIMIT_KEY, JSON.stringify(data));
    }

    // 检查这个浏览器今天是否已达到每日 session 上限
    // 输入：无
    // 输出：true（已达上限，不能再开新 session）| false（还能开）
    // 例子：
    //   count=2, MAX=3 → false（还能开1个）
    //   count=3, MAX=3 → true（不能再开了）
    function isRateLimited() {
      return getRateLimitData().count >= MAX_SESSIONS_PER_DAY;
    }

    // ════════════════════════════════════════════════════════════
    // Session 管理
    // 用户第一次发消息时才创建 session（懒初始化）
    // sessionId (就是sessionStorage) 格式：sess_1743580000_a1b2c3（时间戳 + 随机串）
    // ════════════════════════════════════════════════════════════
    // 创建新的对话 session（用户第一次发消息时调用）
    // 输入：无
    // 输出：无（副作用：设置 sessionId 变量 + 写入 sessionStorage + localStorage 计数+1）
    //        如果限流了则 sessionId 保持 null，显示限流提示
    // 例子：
    //   正常情况：sessionId 从 null → "sess_1743580000_a1b2c3"
    //             sessionStorage['ttd_media_session'] = "sess_1743580000_a1b2c3"
    //             localStorage['ttd_media_sessions'] 的 count 从 1 → 2
    //   限流情况：sessionId 保持 null，界面显示 "Trial limit reached"
    function initSession() {
      if (isRateLimited()) {
        limitNotice.classList.add('active');
        inputEl.disabled = true;
        return;
      }
      sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      sessionStorage.setItem('ttd_media_session', sessionId);
      incrementRateLimit();
    }

    // ════════════════════════════════════════════════════════════
    // UI 辅助函数
    // ════════════════════════════════════════════════════════════

    // 添加一条消息气泡到聊天区域
    // 输入：text = 消息文本, role = 'bot' | 'user' | 'system'
    // 输出：返回创建的 <div> 元素
    // 例子：
    //   addMessage("Hello!", "user")
    //   → 在聊天区右侧添加紫色气泡，内容 "Hello!"
    //   addMessage("What style do you prefer?", "bot")
    //   → 在聊天区左侧添加深色气泡，内容 "What style do you prefer?"
    //   addMessage("Connection error.", "system")
    //   → 在聊天区居中添加灰色小字，内容 "Connection error."
    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = formatText(text);
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    // 添加生成的图片/视频到聊天区域（显示为网格卡片）
    // 输入：mediaList = 媒体文件数组
    // 输出：无（副作用：在聊天区添加图片/视频卡片）
    // 例子：
    //   addMedia([
    //     { type: "image", filename: "sess_170000_a1b2c3/img_170000.png" },
    //     { type: "video", filename: "sess_170000_a1b2c3/vid_170001.mp4" }
    //   ])
    //   → 在聊天区添加一个网格，包含一张图片和一个视频播放器
    //   → 图片 src = "http://localhost:5090/media/sess_170000_a1b2c3/img_170000.png"
    function addMedia(mediaList) {
      const dlIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>';
      const openIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>';

      for (const m of mediaList) {
        const block = document.createElement('div');
        block.className = 'media-block';
        const url = `${API_BASE}/media/${m.filename}`;

        if (m.type === 'image') {
          block.innerHTML = `
            <img src="${url}" alt="Generated image" loading="lazy">
            <div class="media-actions">
              <span class="media-tag">AI Generated Image</span>
              <a href="${url}" download>Download ${dlIcon}</a>
              <a href="${url}" target="_blank">Open ${openIcon}</a>
            </div>`;
        } else if (m.type === 'video') {
          block.innerHTML = `
            <video src="${url}" controls playsinline></video>
            <div class="media-actions">
              <span class="media-tag">AI Generated Video</span>
              <a href="${url}" download>Download ${dlIcon}</a>
              <a href="${url}" target="_blank">Open ${openIcon}</a>
            </div>`;
        }
        chatEl.appendChild(block);
      }
      scrollToBottom();
    }

    // 显示"正在输入"动画（三个跳动的点，模拟 bot 正在思考）
    // 输入：无
    // 输出：无（副作用：在聊天区底部添加一个 id="typing" 的动画元素）
    // 调用时机：用户发完消息、等待后端响应期间
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(div);
      scrollToBottom();
    }

    // 隐藏"正在输入"动画
    // 输入：无
    // 输出：无（副作用：从 DOM 中删除 id="typing" 的元素）
    // 调用时机：后端响应到达后
    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // 显示/隐藏底部状态条（生成进度提示）
    // 输入：text = 状态文字 或 null/falsy
    // 输出：无（副作用：显示或隐藏状态条）
    // 例子：
    //   setStatus("Generating image...")   → 状态条显示，文字为 "Generating image..."
    //   setStatus("Generating video...")   → 状态条文字更新为 "Generating video..."
    //   setStatus(null)                    → 状态条隐藏
    function setStatus(text) {
      if (text) {
        statusText.textContent = text;
        statusBar.classList.add('active');
        scrollToBottom();
      } else {
        statusBar.classList.remove('active');
      }
    }

    // 转义 HTML 特殊字符 + 换行转 <br>（防 XSS 注入 + 保留换行格式）
    // 输入：text = 原始文本字符串
    // 输出：安全的 HTML 字符串
    // 例子：
    //   formatText("Hello\nWorld")      → "Hello<br>World"
    //   formatText("<script>alert(1)")  → "&lt;script&gt;alert(1)"
    //   formatText("A & B")            → "A &amp; B"
    function formatText(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    // ════════════════════════════════════════════════════════════
    // 输入框事件
    // ════════════════════════════════════════════════════════════

    // 输入时自动调整 textarea 高度（最高 120px），并控制发送按钮是否可点击
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      sendBtn.disabled = !inputEl.value.trim() || generating;
    });

    // 回车发送（Shift+回车换行）
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    // ════════════════════════════════════════════════════════════
    // 发送消息（核心函数）
    // 输入：text = 要发送的文本（可选，不传则取输入框内容）
    // 输出：无（副作用：发 HTTP 请求、更新界面、可能触发轮询）
    // 例子：
    //   sendMessage("I need an ad for my restaurant")
    //   → 界面显示用户消息 → POST /chat → 后端返回 {reply: "What style?", stage: "gathering"}
    //   → 界面显示 bot 回复 "What style?"
    //
    //   sendMessage("modern style, go ahead")
    //   → POST /chat → 后端返回 {reply: "Got it! Generating...", stage: "generating"}
    //   → 界面显示 bot 回复 → 显示状态条 → 进入 pollForResults() 轮询
    //
    //   当后端 IP 限流时：
    //   → POST /chat → 返回 {reply: "Daily limit reached", stage: "limited"}
    //   → 输入框被禁用
    // ════════════════════════════════════════════════════════════
    async function sendMessage(text) {
      text = text || inputEl.value.trim();
      if (!text || generating) return;

      // 第一次发消息时才创建 session（懒初始化）
      if (!sessionId) initSession();
      if (!sessionId) return; // initSession 可能因为限流失败，sessionId 仍为 null

      // 前端拦截：如果之前已经被后端标记为 limited（IP超限），直接拦住
      // 或者这个 session 的生成次数已经到上限，直接提示，不发请求到后端
      // 这样不会浪费 GPT 对话的 API 调用
      if (sessionStorage.getItem('ttd_media_limited') === '1') {
        addMessage(text, 'user');
        addMessage('You\'ve reached the daily trial limit. Book a demo to unlock full access!', 'system');
        inputEl.disabled = true;
        return;
      }
      if (generateCount >= MAX_GENERATES_PER_SESSION) {
        addMessage(text, 'user');
        addMessage('You\'ve reached the trial limit for this session. Book a demo to explore our full AI content capabilities!', 'system');
        inputEl.disabled = true;
        return;
      }

      // 在界面上显示用户消息
      addMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      generating = true;

      // 显示"正在输入"动画
      showTyping();

      try {
        // 发送到后端 Flask API
        const res = await fetch(API_BASE + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, message: text })
        });

        hideTyping();

        // HTTP 错误处理
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Server error' }));
          addMessage('Error: ' + (err.error || 'Something went wrong'), 'system');
          generating = false;
          sendBtn.disabled = false;
          return;
        }

        const data = await res.json();
        // data 结构：{ reply: "bot的回复", stage: "gathering|generating|done|limited" }

        // 显示 bot 的回复消息
        if (data.reply) addMessage(data.reply, 'bot');

        // stage=limited：后端 IP 限流或 session 限流触发，禁用输入框
        // 同时记到 sessionStorage，这样刷新页面后也能拦截，不浪费 GPT 调用
        if (data.stage === 'limited') {
          inputEl.disabled = true;
          sessionStorage.setItem('ttd_media_limited', '1');
          generating = false;
          return;
        }

        // stage=generating：AI 判断信息够了，后端已启动 Seedream/Seedance 生成
        // 前端进入轮询模式，等待生成完成
        if (data.stage === 'generating') {
          generateCount++;
          sessionStorage.setItem('ttd_media_gencount', String(generateCount));
          setStatus('Generating your content — this may take 1-2 minutes...');
          pollForResults();  // 开始轮询
          return; // 注意这里 return 了，generating 保持 true，用户不能发新消息
        }

        // 如果返回了媒体结果（通常不会在 /chat 里直接返回，但兼容一下）
        if (data.media && data.media.length > 0) addMedia(data.media);

      } catch (err) {
        hideTyping();
        addMessage('Connection error. Please check if the server is running.', 'system');
      }

      generating = false;
      sendBtn.disabled = !inputEl.value.trim();
    }

    // ════════════════════════════════════════════════════════════
    // 轮询生成结果
    // 输入：无（使用全局变量 sessionId）
    // 输出：无（副作用：循环调 GET /session/:id，完成后显示媒体结果）
    // 例子：
    //   轮询中 → GET /session/sess_xxx → { stage: "generating", status_text: "Generating image..." }
    //   → 状态条更新为 "Generating image..."
    //
    //   轮询中 → GET /session/sess_xxx → { stage: "done", media: [{type:"image", filename:"sess_xxx/img_170000.png"}], reply: "Done!" }
    //   → 隐藏状态条 → 在聊天区显示图片 → 显示 "Done!" → 停止轮询
    //
    //   超时（6分钟）→ 显示 "Generation timed out" → 停止轮询
    // ════════════════════════════════════════════════════════════
    async function pollForResults() {
      const pollInterval = 3000;
      const maxPolls = 300;   // 300 × 3s = 15 分钟（3图+2视频需要 8+ 分钟）
      let polls = 0;
      let renderedCount = 0;  // 已经渲染到页面上的 media 数量

      while (polls < maxPolls) {
        await new Promise(r => setTimeout(r, pollInterval));
        polls++;

        try {
          const res = await fetch(API_BASE + '/session/' + sessionId);
          if (!res.ok) continue;

          const data = await res.json();

          // 增量渲染：有新的 media 就立刻显示，不等全部完成
          if (data.media && data.media.length > renderedCount) {
            const newItems = data.media.slice(renderedCount);
            addMedia(newItems);
            renderedCount = data.media.length;
          }

          // 全部完成
          if (data.stage === 'done') {
            setStatus(null);
            if (data.reply) addMessage(data.reply, 'bot');
            generating = false;
            sendBtn.disabled = !inputEl.value.trim();
            return;
          }

          // 生成失败，回退
          if (data.stage === 'gathering' && data.reply) {
            setStatus(null);
            addMessage(data.reply, 'bot');
            generating = false;
            sendBtn.disabled = !inputEl.value.trim();
            return;
          }

          // 还在生成中，更新状态文字
          if (data.status_text) setStatus(data.status_text);
        } catch { /* 网络错误，继续轮询 */ }
      }

      // 超时
      setStatus(null);
      addMessage('Generation timed out. Please try again.', 'system');
      generating = false;
      sendBtn.disabled = !inputEl.value.trim();
    }

    // ════════════════════════════════════════════════════════════
    // 页面初始化（页面加载时自动执行）
    // 输入：无
    // 输出：无（副作用：渲染欢迎消息 或 从后端恢复完整对话历史）
    // 例子：
    //   全新访问（sessionId 为 null）：
    //   → 显示 WELCOME_MSG 欢迎消息
    //
    //   刷新页面（sessionStorage 里有 sessionId = "sess_170000_a1b2c3"）：
    //   → GET /session/sess_170000_a1b2c3/history
    //   → 后端返回 { messages: [{role:"user",content:"I need..."}, {role:"assistant",content:"What style?"}], media: [...], stage: "gathering" }
    //   → 先显示欢迎消息 → 再逐条渲染历史消息 → 如有媒体也显示 → 如果在生成中则恢复轮询
    //
    //   刷新时后端连不上：
    //   → catch 捕获错误 → 当作全新访问，只显示欢迎消息
    // ════════════════════════════════════════════════════════════
    async function init() {
      // 先检查前端限流
      if (isRateLimited()) {
        limitNotice.classList.add('active');
        inputEl.disabled = true;
      }

      // 如果 sessionStorage 里有 sessionId，说明是刷新页面，尝试恢复对话
      if (sessionId) {
        try {
          const res = await fetch(API_BASE + '/session/' + sessionId + '/history');
          if (res.ok) {
            const data = await res.json();

            // 清空聊天区域再重新渲染，防止和之前增量渲染的内容重复
            chatEl.innerHTML = '';
            addMessage(WELCOME_MSG, 'bot');
            for (const msg of data.messages) {
              addMessage(msg.content, msg.role === 'user' ? 'user' : 'bot');
            }

            // 如果之前已经生成了图片/视频，也重新显示
            if (data.media && data.media.length > 0) {
              addMedia(data.media);
            }

            // 如果刷新时正好在生成中，恢复轮询
            if (data.stage === 'generating') {
              generating = true;
              setStatus('Generating your content — this may take 1-2 minutes...');
              pollForResults();
            }
            return; // 恢复完毕，不再显示欢迎消息（上面已经显示了）
          }
        } catch { /* 后端连不上，当作全新对话 */ }
      }

      // 全新访问，显示欢迎消息
      addMessage(WELCOME_MSG, 'bot');
    }

    // 启动初始化
    init();
  </script>
</body>
</html>
